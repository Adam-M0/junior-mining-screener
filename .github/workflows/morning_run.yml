name: Daily Morning Mining Screener

on:
  schedule:
    # This string means: Run every Monday-Friday at 12:30 UTC (8:30 AM Eastern Time)
    - cron: '30 12 * * 1-5'
  workflow_dispatch: # This allows you to also trigger it manually with a button click

jobs:
  run-screener:
    runs-on: ubuntu-latest
    steps:
      - name: Copy code repository
        uses: actions/checkout@v4

      - name: Wake up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Libraries
        run: |
          pip install yfinance openai

      - name: Run Script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python screener.py
